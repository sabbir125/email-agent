version: "3.9"

services:
  email-agent:
    build: .
    container_name: ai-email-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist the SQLite database outside the container
      - email_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  email_data:
